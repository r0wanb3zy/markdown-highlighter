<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Syntax Highlighter</title>

<style>
  /* ============================================================
     RESET & BASE
     ============================================================ */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #1e1e2e;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
    font-size: 15px;
    color: #cdd6f4;
  }

  /* ============================================================
     EDITOR CONTAINER
     ============================================================ */
  #editor {
    width: 100%;
    height: 100%;
    padding: 20px 24px;
    overflow-y: auto;
    position: relative;
  }

  /* Hidden textarea that captures all input */
  #input {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    padding: 20px 24px;
    background: transparent;
    color: transparent;
    caret-color: #f5e0dc;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: inherit;
    line-height: 1.7;
    z-index: 2;
    white-space: pre-wrap;
    word-wrap: break-word;
    -webkit-text-fill-color: transparent;
  }

  /* Highlighted output layer */
  #highlight-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    padding: 20px 24px;
    pointer-events: none;
    z-index: 1;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: inherit;
    font-size: inherit;
    line-height: 1.7;
    overflow-y: auto;
  }

  /* ============================================================
     SYNTAX HIGHLIGHT COLORS (Catppuccin-inspired)
     ============================================================ */

  /* Headings */
  .md-h1 {
    color: #f38ba8;
    font-weight: 700;
    font-size: 1.5em;
  }
  .md-h2 {
    color: #fab387;
    font-weight: 700;
    font-size: 1.3em;
  }
  .md-h3 {
    color: #f9e2af;
    font-weight: 600;
    font-size: 1.15em;
  }
  .md-h4 {
    color: #a6e3a1;
    font-weight: 600;
    font-size: 1.05em;
  }
  .md-h5 {
    color: #89dceb;
    font-weight: 600;
  }
  .md-h6 {
    color: #b4befe;
    font-weight: 600;
  }
  .md-hash {
    opacity: 0.5;
  }

  /* Bold */
  .md-bold {
    color: #fab387;
    font-weight: 700;
  }
  .md-bold-marker {
    color: #fab387;
    opacity: 0.4;
  }

  /* Italic */
  .md-italic {
    color: #f5c2e7;
    font-style: italic;
  }
  .md-italic-marker {
    color: #f5c2e7;
    opacity: 0.4;
  }

  /* Bold + Italic */
  .md-bolditalic {
    color: #f5c2e7;
    font-weight: 700;
    font-style: italic;
  }

  /* Strikethrough */
  .md-strike {
    color: #6c7086;
    text-decoration: line-through;
  }
  .md-strike-marker {
    color: #6c7086;
    opacity: 0.4;
  }

  /* Inline code */
  .md-inline-code {
    color: #a6e3a1;
    background: rgba(166, 227, 161, 0.1);
    border-radius: 3px;
    padding: 1px 4px;
  }
  .md-code-marker {
    color: #a6e3a1;
    opacity: 0.4;
  }

  /* Code block fences */
  .md-code-fence {
    color: #a6e3a1;
    opacity: 0.6;
  }

  /* Code block content */
  .md-code-block {
    color: #a6e3a1;
    background: rgba(166, 227, 161, 0.05);
  }

  /* Links */
  .md-link-brackets {
    color: #89b4fa;
    opacity: 0.5;
  }
  .md-link-text {
    color: #89b4fa;
    text-decoration: underline;
  }
  .md-link-url {
    color: #74c7ec;
    opacity: 0.6;
  }

  /* Images */
  .md-image-bang {
    color: #cba6f7;
    opacity: 0.5;
  }

  /* Blockquotes */
  .md-blockquote {
    color: #9399b2;
    border-left: 3px solid #9399b2;
    padding-left: 12px;
    display: inline;
  }
  .md-blockquote-marker {
    color: #9399b2;
    opacity: 0.5;
  }

  /* Unordered list markers */
  .md-ul-marker {
    color: #f38ba8;
    font-weight: 700;
  }

  /* Ordered list markers */
  .md-ol-marker {
    color: #fab387;
    font-weight: 700;
  }

  /* Checkboxes */
  .md-checkbox {
    color: #a6e3a1;
    font-weight: 700;
  }
  .md-checkbox-unchecked {
    color: #6c7086;
    font-weight: 700;
  }

  /* Horizontal rules */
  .md-hr {
    color: #585b70;
    font-weight: 700;
  }

  /* ============================================================
     SCROLLBAR
     ============================================================ */
  #input::-webkit-scrollbar,
  #highlight-layer::-webkit-scrollbar {
    width: 8px;
  }
  #input::-webkit-scrollbar-track,
  #highlight-layer::-webkit-scrollbar-track {
    background: transparent;
  }
  #input::-webkit-scrollbar-thumb,
  #highlight-layer::-webkit-scrollbar-thumb {
    background: #45475a;
    border-radius: 4px;
  }

  /* ============================================================
     LIGHT THEME SUPPORT
     ============================================================ */
  body.light {
    background: #eff1f5;
    color: #4c4f69;
  }
  body.light #input {
    caret-color: #dc8a78;
  }
  body.light .md-h1 { color: #d20f39; }
  body.light .md-h2 { color: #fe640b; }
  body.light .md-h3 { color: #df8e1d; }
  body.light .md-h4 { color: #40a02b; }
  body.light .md-h5 { color: #209fb5; }
  body.light .md-h6 { color: #7287fd; }
  body.light .md-bold { color: #fe640b; }
  body.light .md-bold-marker { color: #fe640b; }
  body.light .md-italic { color: #ea76cb; }
  body.light .md-italic-marker { color: #ea76cb; }
  body.light .md-bolditalic { color: #ea76cb; }
  body.light .md-strike { color: #9ca0b0; }
  body.light .md-strike-marker { color: #9ca0b0; }
  body.light .md-inline-code {
    color: #40a02b;
    background: rgba(64, 160, 43, 0.1);
  }
  body.light .md-code-marker { color: #40a02b; }
  body.light .md-code-fence { color: #40a02b; }
  body.light .md-code-block {
    color: #40a02b;
    background: rgba(64, 160, 43, 0.05);
  }
  body.light .md-link-text { color: #1e66f5; }
  body.light .md-link-brackets { color: #1e66f5; }
  body.light .md-link-url { color: #209fb5; }
  body.light .md-image-bang { color: #8839ef; }
  body.light .md-blockquote { color: #8c8fa1; border-left-color: #8c8fa1; }
  body.light .md-blockquote-marker { color: #8c8fa1; }
  body.light .md-ul-marker { color: #d20f39; }
  body.light .md-ol-marker { color: #fe640b; }
  body.light .md-checkbox { color: #40a02b; }
  body.light .md-checkbox-unchecked { color: #9ca0b0; }
  body.light .md-hr { color: #bcc0cc; }
</style>

</head>
<body>

<div id="editor">
  <div id="highlight-layer" aria-hidden="true"></div>
  <textarea id="input" spellcheck="true" placeholder="Start writing Markdown..."></textarea>
</div>

<script>
  /* ==============================================================
     STANDARD NOTES COMPONENT MANAGER (via ComponentRelay)
     
     We load the official library from CDN. If it fails (offline),
     the editor still works standalone.
     ============================================================== */

  (function () {
    'use strict';

    // ── DOM refs ──
    const input = document.getElementById('input');
    const highlightLayer = document.getElementById('highlight-layer');

    // ── State ──
    let note = null;
    let ignoreNextChange = false;
    let componentRelay = null;
    let lastSavedText = '';

    // ── Load ComponentRelay ──
    function loadComponentRelay() {
      return new Promise(function (resolve) {
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/sn-components-api@1.3.4/dist/dist.js';
        script.onload = function () { resolve(true); };
        script.onerror = function () { resolve(false); };
        document.head.appendChild(script);
      });
    }

    // ── Escape HTML entities ──
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Markdown Syntax Highlighting ──
    function highlightMarkdown(text) {
      var lines = text.split('\n');
      var result = [];
      var inCodeBlock = false;

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var escaped = escapeHtml(line);

        // Code block toggle
        if (/^```/.test(line)) {
          inCodeBlock = !inCodeBlock;
          result.push('<span class="md-code-fence">' + escaped + '</span>');
          continue;
        }

        if (inCodeBlock) {
          result.push('<span class="md-code-block">' + escaped + '</span>');
          continue;
        }

        // Horizontal rule: --- or *** or ___ (3+ chars, optional spaces)
        if (/^(\s{0,3})([-*_])\s*\2\s*\2[\s\2]*$/.test(line)) {
          result.push('<span class="md-hr">' + escaped + '</span>');
          continue;
        }

        // Headings
        var headingMatch = line.match(/^(#{1,6})\s(.*)/);
        if (headingMatch) {
          var level = headingMatch[1].length;
          var hashes = escapeHtml(headingMatch[1]);
          var headingText = escapeHtml(headingMatch[2]);
          result.push(
            '<span class="md-h' + level + '">' +
            '<span class="md-hash">' + hashes + '</span> ' +
            headingText +
            '</span>'
          );
          continue;
        }

        // Blockquote
        var bqMatch = line.match(/^(\s{0,3}>+)(.*)/);
        if (bqMatch) {
          var marker = escapeHtml(bqMatch[1]);
          var bqContent = highlightInline(escapeHtml(bqMatch[2]));
          result.push(
            '<span class="md-blockquote">' +
            '<span class="md-blockquote-marker">' + marker + '</span>' +
            bqContent +
            '</span>'
          );
          continue;
        }

        // Unordered list
        var ulMatch = line.match(/^(\s*)([-*+])\s(.*)/);
        if (ulMatch) {
          var indent = escapeHtml(ulMatch[1]);
          var bullet = escapeHtml(ulMatch[2]);
          var ulContent = escapeHtml(ulMatch[3]);

          // Check for checkbox
          var cbMatch = ulMatch[3].match(/^\[([ xX])\]\s?(.*)/);
          if (cbMatch) {
            var isChecked = cbMatch[1] !== ' ';
            var cbClass = isChecked ? 'md-checkbox' : 'md-checkbox-unchecked';
            var cbText = escapeHtml(cbMatch[2]);
            result.push(
              indent +
              '<span class="md-ul-marker">' + bullet + '</span> ' +
              '<span class="' + cbClass + '">[' + escapeHtml(cbMatch[1]) + ']</span> ' +
              highlightInline(cbText)
            );
          } else {
            result.push(
              indent +
              '<span class="md-ul-marker">' + bullet + '</span> ' +
              highlightInline(ulContent)
            );
          }
          continue;
        }

        // Ordered list
        var olMatch = line.match(/^(\s*)(\d+[.\)])\s(.*)/);
        if (olMatch) {
          var olIndent = escapeHtml(olMatch[1]);
          var olMarker = escapeHtml(olMatch[2]);
          var olContent = escapeHtml(olMatch[3]);
          result.push(
            olIndent +
            '<span class="md-ol-marker">' + olMarker + '</span> ' +
            highlightInline(olContent)
          );
          continue;
        }

        // Normal line — apply inline highlighting
        result.push(highlightInline(escaped));
      }

      return result.join('\n');
    }

    // ── Inline syntax highlighting ──
    function highlightInline(escaped) {
      // Order matters: bold+italic before bold before italic

      // Images: ![alt](url)
      escaped = escaped.replace(
        /!\[([^\]]*)\]\(([^)]*)\)/g,
        '<span class="md-image-bang">!</span>' +
        '<span class="md-link-brackets">[</span>' +
        '<span class="md-link-text">$1</span>' +
        '<span class="md-link-brackets">]</span>' +
        '<span class="md-link-brackets">(</span>' +
        '<span class="md-link-url">$2</span>' +
        '<span class="md-link-brackets">)</span>'
      );

      // Links: [text](url)
      escaped = escaped.replace(
        /\[([^\]]*)\]\(([^)]*)\)/g,
        '<span class="md-link-brackets">[</span>' +
        '<span class="md-link-text">$1</span>' +
        '<span class="md-link-brackets">]</span>' +
        '<span class="md-link-brackets">(</span>' +
        '<span class="md-link-url">$2</span>' +
        '<span class="md-link-brackets">)</span>'
      );

      // Inline code: `code`
      escaped = escaped.replace(
        /`([^`]+)`/g,
        '<span class="md-code-marker">`</span>' +
        '<span class="md-inline-code">$1</span>' +
        '<span class="md-code-marker">`</span>'
      );

      // Strikethrough: ~~text~~
      escaped = escaped.replace(
        /~~([^~]+)~~/g,
        '<span class="md-strike-marker">~~</span>' +
        '<span class="md-strike">$1</span>' +
        '<span class="md-strike-marker">~~</span>'
      );

      // Bold + Italic: ***text*** or ___text___
      escaped = escaped.replace(
        /(\*\*\*|___)(.+?)\1/g,
        '<span class="md-bold-marker">$1</span>' +
        '<span class="md-bolditalic">$2</span>' +
        '<span class="md-bold-marker">$1</span>'
      );

      // Bold: **text** or __text__
      escaped = escaped.replace(
        /(\*\*|__)(.+?)\1/g,
        '<span class="md-bold-marker">$1</span>' +
        '<span class="md-bold">$2</span>' +
        '<span class="md-bold-marker">$1</span>'
      );

      // Italic: *text* or _text_ (but not inside words for _)
      escaped = escaped.replace(
        /(\*|_)(.+?)\1/g,
        '<span class="md-italic-marker">$1</span>' +
        '<span class="md-italic">$2</span>' +
        '<span class="md-italic-marker">$1</span>'
      );

      return escaped;
    }

    // ── Sync scroll positions ──
    function syncScroll() {
      highlightLayer.scrollTop = input.scrollTop;
      highlightLayer.scrollLeft = input.scrollLeft;
    }

    // ── Update the highlight layer ──
    function updateHighlight() {
      var text = input.value;
      // Add trailing newline so the highlight layer matches the textarea height
      highlightLayer.innerHTML = highlightMarkdown(text) + '\n';
    }

    // ── Save note to Standard Notes ──
    function saveNote() {
      if (componentRelay && note) {
        var text = input.value;
        if (text !== lastSavedText) {
          lastSavedText = text;
          componentRelay.saveItemWithPresave(note, function () {
            note.content.text = text;
          });
        }
      }
    }

    // ── Debounced save ──
    var saveTimeout;
    function debouncedSave() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveNote, 350);
    }

    // ── Event listeners ──
    input.addEventListener('input', function () {
      if (ignoreNextChange) {
        ignoreNextChange = false;
        return;
      }
      updateHighlight();
      debouncedSave();
    });

    input.addEventListener('scroll', syncScroll);

    // Tab key inserts spaces instead of changing focus
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        var start = this.selectionStart;
        var end = this.selectionEnd;
        var val = this.value;
        this.value = val.substring(0, start) + '  ' + val.substring(end);
        this.selectionStart = this.selectionEnd = start + 2;
        updateHighlight();
        debouncedSave();
      }
    });

    // ── Detect theme from Standard Notes ──
    function applyTheme() {
      // Standard Notes sets a CSS variable or class on the parent
      // We also check for a message from the component manager
      var bg = window.getComputedStyle(document.body).backgroundColor;
      if (bg) {
        // Simple heuristic: if background is light, use light theme
        var match = bg.match(/\d+/g);
        if (match && match.length >= 3) {
          var brightness = (parseInt(match[0]) * 299 + parseInt(match[1]) * 587 + parseInt(match[2]) * 114) / 1000;
          if (brightness > 128) {
            document.body.classList.add('light');
            document.body.classList.remove('dark');
          } else {
            document.body.classList.add('dark');
            document.body.classList.remove('light');
          }
        }
      }
    }

    // ── Initialize ──
    async function init() {
      var loaded = await loadComponentRelay();

      if (loaded && window.ComponentRelay) {
        componentRelay = new ComponentRelay({
          targetWindow: window,
          options: {
            coallesedSaving: true,
            coallesedSavingDelay: 400
          }
        });

        componentRelay.streamContextItem(function (item) {
          note = item;

          if (note && note.content && note.content.text != null) {
            if (note.content.text !== input.value) {
              ignoreNextChange = true;
              input.value = note.content.text;
              lastSavedText = note.content.text;
              updateHighlight();
            }
          }

          // Check if note is locked (read-only)
          if (note && note.content && note.content.appData) {
            var appData = note.content.appData;
            var orgData = appData['org.standardnotes.sn'] || {};
            if (orgData.locked) {
              input.setAttribute('readonly', 'true');
            } else {
              input.removeAttribute('readonly');
            }
          }
        });

        // Listen for theme changes
        componentRelay.onThemesChange(function () {
          setTimeout(applyTheme, 100);
        });
      }

      // Initial highlight for any existing content
      updateHighlight();
      applyTheme();

      // Watch for theme changes via MutationObserver
      var observer = new MutationObserver(function () {
        setTimeout(applyTheme, 50);
      });
      observer.observe(document.body, { attributes: true, attributeFilter: ['style', 'class'] });
    }

    init();

  })();
</script>

</body>
</html>
