<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Syntax Highlighter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: #0d1117;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px; color: #e6edf3;
  }

  #editor { width: 100%; height: 100%; position: relative; }

  #backdrop {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    overflow: auto; pointer-events: none; z-index: 1;
  }

  #highlight-layer {
    padding: 24px 28px;
    font-family: inherit; font-size: 14px; line-height: 1.75;
    white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word;
    tab-size: 2; min-height: 100%;
  }

  #input {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    padding: 24px 28px; background: transparent;
    color: transparent; caret-color: #58a6ff;
    border: none; outline: none; resize: none;
    font-family: inherit; font-size: 14px; line-height: 1.75; z-index: 2;
    white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word;
    tab-size: 2; -webkit-text-fill-color: transparent; overflow: auto;
  }

  #input::selection { background: rgba(56, 139, 253, 0.3); }

  /* Syntax colours */
  .tx  { color: #e6edf3; }
  .h1  { color: #ff7b72; font-weight: 700; }
  .h2  { color: #ffa657; font-weight: 700; }
  .h3  { color: #e3b341; font-weight: 600; }
  .h4  { color: #7ee787; font-weight: 600; }
  .h5  { color: #79c0ff; font-weight: 600; }
  .h6  { color: #d2a8ff; font-weight: 600; }
  .hm  { opacity: 0.35; }
  .b   { color: #ffa657; font-weight: 700; }
  .bm  { color: #ffa657; opacity: 0.35; }
  .i   { color: #d2a8ff; font-style: italic; }
  .im  { color: #d2a8ff; opacity: 0.35; }
  .bi  { color: #f0883e; font-weight: 700; font-style: italic; }
  .bim { color: #f0883e; opacity: 0.35; }
  .s   { color: #6e7681; text-decoration: line-through; }
  .sm  { color: #6e7681; opacity: 0.35; }
  .c   { color: #79c0ff; background: rgba(110,118,129,0.15); border-radius: 3px; }
  .cm  { color: #79c0ff; opacity: 0.3; }
  .cf  { color: #7ee787; opacity: 0.4; }
  .cb  { color: #8b949e; }
  .lb  { color: #58a6ff; opacity: 0.35; }
  .lt  { color: #58a6ff; text-decoration: underline; text-underline-offset: 2px; }
  .lu  { color: #6e7681; }
  .ib  { color: #d2a8ff; opacity: 0.4; }
  .bqm { color: #484f58; }
  .bq  { color: #8b949e; }
  .ul  { color: #ff7b72; font-weight: 700; }
  .ol  { color: #ffa657; font-weight: 700; }
  .con { color: #7ee787; font-weight: 700; }
  .coff{ color: #484f58; font-weight: 700; }
  .hr  { color: #30363d; font-weight: 700; }

  #input::-webkit-scrollbar, #backdrop::-webkit-scrollbar { width: 6px; }
  #input::-webkit-scrollbar-track, #backdrop::-webkit-scrollbar-track { background: transparent; }
  #input::-webkit-scrollbar-thumb, #backdrop::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  /* Debug status bar — remove once saving is confirmed working */
  #status {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
    background: #161b22; border-top: 1px solid #30363d;
    color: #8b949e; font-size: 11px; padding: 3px 10px;
    font-family: monospace;
  }
  #status:empty { display: none; }
</style>
</head>
<body>
<div id="editor">
  <div id="backdrop"><div id="highlight-layer"></div></div>
  <textarea id="input" spellcheck="true" placeholder="Start writing Markdown..."></textarea>
</div>
<div id="status">connecting...</div>
<script>
(function () {
  'use strict';

  var input   = document.getElementById('input');
  var backdrop= document.getElementById('backdrop');
  var hl      = document.getElementById('highlight-layer');
  var statusEl= document.getElementById('status');

  function setStatus(msg) { statusEl.textContent = msg; }

  // ── State ──────────────────────────────────────────────────
  var sessionKey   = null;
  var registered   = false; // true after component-registered received
  var currentItem  = null;  // the full item object SN sent us
  var noteLoaded   = false; // true only after SN delivers the note
  var saveTimer    = null;
  var readyTimer   = null;  // retry sending 'ready' until acknowledged
  var noteTimer    = null;  // retry stream-context-item until note arrives
  var statusTimer  = null;  // clears the "saved" flash

  // ── Messaging helpers ───────────────────────────────────────
  function uid() { return Math.random().toString(36).slice(2) + Date.now(); }

  function send(action, data) {
    var msg = { action: action, data: data || {}, messageId: uid(), api: 'component' };
    if (sessionKey) msg.sessionKey = sessionKey;
    window.parent.postMessage(JSON.stringify(msg), '*');
  }

  // ── SN message handler ──────────────────────────────────────
  window.addEventListener('message', function (event) {
    var msg;
    try { msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data; }
    catch (e) { return; }
    if (!msg || !msg.action) return;

    console.log('[SN Plugin] rx:', msg.action);

    // Step 2: SN confirms registration → ask for the note
    if (msg.action === 'component-registered') {
      // Newer SN versions may nest the key inside data
      sessionKey = msg.sessionKey || (msg.data && msg.data.sessionKey) || null;
      registered = true;
      clearInterval(readyTimer);
      setStatus('loading note... (sessionKey ' + (sessionKey ? 'ok' : 'MISSING') + ')');
      console.log('[SN Plugin] component-registered. sessionKey:', sessionKey ? 'present' : 'MISSING');
      send('stream-context-item');
      // Retry if SN doesn't respond with the note within 1 s
      noteTimer = setInterval(function () {
        if (noteLoaded) { clearInterval(noteTimer); return; }
        console.log('[SN Plugin] re-requesting stream-context-item');
        send('stream-context-item');
      }, 1000);
      return;
    }

    // Step 3: SN delivers the note to us
    if (msg.action === 'stream-context-item') {
      var item = msg.data && msg.data.item;
      console.log('[SN Plugin] stream-context-item received. item:', item ? 'present' : 'MISSING',
        'isMetadataUpdate:', item && item.isMetadataUpdate,
        'hasContent:', item && !!item.content);
      if (!item || !item.content) {
        setStatus('stream-context-item: item or content missing');
        return;
      }

      // Once the note is loaded, skip pure metadata updates (tags, pin, etc.)
      // but always accept the FIRST delivery so the note content appears,
      // even if SN happens to mark it as a metadata update
      if (item.isMetadataUpdate && noteLoaded) return;

      clearInterval(noteTimer);

      // Store the full item so SN gets back exactly what it expects on save
      currentItem = JSON.parse(JSON.stringify(item));
      // SN may deliver content as a JSON string — parse it if so
      if (typeof currentItem.content === 'string') {
        currentItem.content = JSON.parse(currentItem.content);
      }

      // Load text into editor
      var text = currentItem.content.text || '';
      input.value = text;
      noteLoaded = true;
      setStatus('');
      console.log('[SN Plugin] Note loaded. text length:', text.length, 'uuid:', currentItem.uuid);
      render();
      return;
    }
  });

  // Step 1: tell SN we exist — retry every 500 ms until acknowledged
  setStatus('connecting...');
  send('ready');
  readyTimer = setInterval(function () {
    if (registered) { clearInterval(readyTimer); return; }
    send('ready');
  }, 500);

  // ── Save ────────────────────────────────────────────────────
  function doSave() {
    if (!noteLoaded || !currentItem) return;
    currentItem.content.text = input.value;
    console.log('[SN Plugin] save-items sending. text length:', input.value.length);
    send('save-items', { items: [currentItem] });
    clearTimeout(statusTimer);
    setStatus('saved');
    statusTimer = setTimeout(function () { setStatus(''); }, 1500);
  }

  function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(doSave, 100); }
  function saveNow()       { clearTimeout(saveTimer); doSave(); }

  input.addEventListener('input', function () { render(); scheduleSave(); });
  input.addEventListener('blur',  saveNow);
  window.addEventListener('blur', saveNow);
  window.addEventListener('beforeunload', saveNow);
  document.addEventListener('visibilitychange', function () { if (document.hidden) saveNow(); });

  // ── Highlighting ────────────────────────────────────────────
  function esc(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function inl(s) {
    s = s.replace(/!\[([^\]]*)\]\(([^)]*)\)/g, function(_,a,u) {
      return '<span class="ib">!</span><span class="lb">[</span><span class="lt">'+a+'</span><span class="lb">](</span><span class="lu">'+u+'</span><span class="lb">)</span>';
    });
    s = s.replace(/\[([^\]]*)\]\(([^)]*)\)/g, function(_,t,u) {
      return '<span class="lb">[</span><span class="lt">'+t+'</span><span class="lb">](</span><span class="lu">'+u+'</span><span class="lb">)</span>';
    });
    s = s.replace(/`([^`]+)`/g, function(_,c) {
      return '<span class="cm">`</span><span class="c">'+c+'</span><span class="cm">`</span>';
    });
    s = s.replace(/~~([^~]+)~~/g, function(_,t) {
      return '<span class="sm">~~</span><span class="s">'+t+'</span><span class="sm">~~</span>';
    });
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, function(_,t) {
      return '<span class="bim">***</span><span class="bi">'+t+'</span><span class="bim">***</span>';
    });
    s = s.replace(/___(.+?)___/g, function(_,t) {
      return '<span class="bim">___</span><span class="bi">'+t+'</span><span class="bim">___</span>';
    });
    s = s.replace(/\*\*(.+?)\*\*/g, function(_,t) {
      return '<span class="bm">**</span><span class="b">'+t+'</span><span class="bm">**</span>';
    });
    s = s.replace(/__(.+?)__/g, function(_,t) {
      return '<span class="bm">__</span><span class="b">'+t+'</span><span class="bm">__</span>';
    });
    s = s.replace(/(?<!\*)\*([^\*\n]+)\*(?!\*)/g, function(_,t) {
      return '<span class="im">*</span><span class="i">'+t+'</span><span class="im">*</span>';
    });
    s = s.replace(/(?<![a-zA-Z0-9])_([^_\n]+)_(?![a-zA-Z0-9])/g, function(_,t) {
      return '<span class="im">_</span><span class="i">'+t+'</span><span class="im">_</span>';
    });
    return s;
  }

  function highlight(text) {
    var lines = text.split('\n'), out = [], inCode = false;
    for (var i = 0; i < lines.length; i++) {
      var raw = lines[i], x = esc(raw);

      if (/^(`{3,}|~{3,})/.test(raw)) {
        inCode = !inCode;
        out.push('<span class="cf">'+x+'</span>');
        continue;
      }
      if (inCode) { out.push('<span class="cb">'+x+'</span>'); continue; }

      if (/^\s{0,3}([-*_])\s*(\1\s*){2,}$/.test(raw)) {
        out.push('<span class="hr">'+x+'</span>'); continue;
      }

      var hm = raw.match(/^(#{1,6})\s(.*)/);
      if (hm) {
        out.push('<span class="h'+hm[1].length+'"><span class="hm">'+esc(hm[1])+'</span><span class="tx"> </span>'+inl(esc(hm[2]))+'</span>');
        continue;
      }

      var bq = raw.match(/^(\s{0,3}>+)(.*)/);
      if (bq) {
        out.push('<span class="bqm">'+esc(bq[1])+'</span><span class="bq">'+inl(esc(bq[2]))+'</span>');
        continue;
      }

      var ul = raw.match(/^(\s*)([-*+])\s(.*)/);
      if (ul) {
        var cb = ul[3].match(/^\[([ xX])\]\s?(.*)/);
        if (cb) {
          var cc = cb[1] !== ' ' ? 'con' : 'coff';
          out.push('<span class="tx">'+esc(ul[1])+'</span><span class="ul">'+esc(ul[2])+'</span><span class="tx"> </span><span class="'+cc+'">['+esc(cb[1])+']</span><span class="tx"> </span>'+inl(esc(cb[2])));
        } else {
          out.push('<span class="tx">'+esc(ul[1])+'</span><span class="ul">'+esc(ul[2])+'</span><span class="tx"> </span>'+inl(esc(ul[3])));
        }
        continue;
      }

      var ol = raw.match(/^(\s*)(\d+[.\)])\s(.*)/);
      if (ol) {
        out.push('<span class="tx">'+esc(ol[1])+'</span><span class="ol">'+esc(ol[2])+'</span><span class="tx"> </span>'+inl(esc(ol[3])));
        continue;
      }

      out.push('<span class="tx">'+inl(x)+'</span>');
    }
    return out.join('\n');
  }

  function render() { hl.innerHTML = highlight(input.value) + '\n'; }
  function syncScroll() { backdrop.scrollTop = input.scrollTop; backdrop.scrollLeft = input.scrollLeft; }
  input.addEventListener('scroll', syncScroll);

  // ── Smart Enter ─────────────────────────────────────────────
  input.addEventListener('keydown', function (ev) {
    if (ev.key === 'Tab') {
      ev.preventDefault();
      var s = input.selectionStart;
      input.value = input.value.slice(0,s) + '  ' + input.value.slice(input.selectionEnd);
      input.selectionStart = input.selectionEnd = s + 2;
      render(); scheduleSave(); return;
    }
    if (ev.key !== 'Enter') return;
    var s = input.selectionStart, v = input.value;
    var ls = v.lastIndexOf('\n', s-1)+1, line = v.slice(ls, s), ins = null;

    var cbm = line.match(/^(\s*)([-*+])\s\[[ xX]\]\s/);
    if (cbm) {
      if (!line.replace(/^(\s*)([-*+])\s\[[ xX]\]\s/,'').trim()) { ev.preventDefault(); input.value=v.slice(0,ls)+'\n'+v.slice(s); input.selectionStart=input.selectionEnd=ls+1; render(); scheduleSave(); return; }
      ins = cbm[1]+cbm[2]+' [ ] ';
    }
    if (!ins) { var ulm=line.match(/^(\s*)([-*+])\s/); if(ulm){ if(!line.slice(ulm[0].length).trim()){ev.preventDefault();input.value=v.slice(0,ls)+'\n'+v.slice(s);input.selectionStart=input.selectionEnd=ls+1;render();scheduleSave();return;} ins=ulm[1]+ulm[2]+' '; } }
    if (!ins) { var olm=line.match(/^(\s*)(\d+)([.\)])\s/); if(olm){ if(!line.slice(olm[0].length).trim()){ev.preventDefault();input.value=v.slice(0,ls)+'\n'+v.slice(s);input.selectionStart=input.selectionEnd=ls+1;render();scheduleSave();return;} ins=olm[1]+(+olm[2]+1)+olm[3]+' '; } }
    if (!ins) { var bqm=line.match(/^(\s*>+\s?)/); if(bqm){ if(!line.slice(bqm[0].length).trim()){ev.preventDefault();input.value=v.slice(0,ls)+'\n'+v.slice(s);input.selectionStart=input.selectionEnd=ls+1;render();scheduleSave();return;} ins=bqm[1]; } }
    if (ins) { ev.preventDefault(); input.value=v.slice(0,s)+'\n'+ins+v.slice(input.selectionEnd); input.selectionStart=input.selectionEnd=s+1+ins.length; render(); scheduleSave(); }
  });

  render();
})();
</script>
</body>
</html>
