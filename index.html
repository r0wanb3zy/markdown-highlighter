<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Highlight Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--sn-stylekit-background-color, #ffffff);
      color: var(--sn-stylekit-foreground-color, #1a1a1a);
      font-family: var(--sn-stylekit-editor-font-family, 'Georgia', serif);
      font-size: var(--sn-stylekit-font-size-editor, 16px);
    }

    #editor-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* The hidden textarea captures keystrokes */
    #raw-input {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      z-index: 2;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: transparent;
      caret-color: var(--sn-stylekit-foreground-color, #1a1a1a);
      font-family: inherit;
      font-size: inherit;
      line-height: 1.7;
      padding: 20px 24px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      tab-size: 4;
      -webkit-text-fill-color: transparent;
    }

    /* The highlighted display layer sits behind */
    #highlight-display {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      font-family: inherit;
      font-size: inherit;
      line-height: 1.7;
      padding: 20px 24px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      tab-size: 4;
      pointer-events: none;
      color: var(--sn-stylekit-foreground-color, #1a1a1a);
    }

    /* ── Markdown highlight colours ── */

    /* Headings: bold + accent colour */
    .md-h1 { color: var(--md-heading-color); font-weight: 700; font-size: 1.5em; }
    .md-h2 { color: var(--md-heading-color); font-weight: 700; font-size: 1.3em; }
    .md-h3 { color: var(--md-heading-color); font-weight: 700; font-size: 1.15em; }
    .md-h4, .md-h5, .md-h6 { color: var(--md-heading-color); font-weight: 700; }

    /* Inline syntax markers dimmed */
    .md-syntax { color: var(--md-syntax-color); }

    /* Bold text */
    .md-bold { font-weight: 700; }

    /* Italic text */
    .md-italic { font-style: italic; }

    /* Bold+Italic */
    .md-bold-italic { font-weight: 700; font-style: italic; }

    /* Inline code */
    .md-code {
      color: var(--md-code-color);
      background: var(--md-code-bg);
      border-radius: 3px;
      padding: 0 3px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.92em;
    }

    /* Fenced code blocks */
    .md-codeblock {
      color: var(--md-code-color);
      background: var(--md-code-bg);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.92em;
      display: inline; /* spans inside pre-wrap work inline */
    }

    /* Blockquotes */
    .md-blockquote { color: var(--md-blockquote-color); font-style: italic; }

    /* Links */
    .md-link { color: var(--md-link-color); }

    /* Images */
    .md-image { color: var(--md-image-color); }

    /* Horizontal rules */
    .md-hr { color: var(--md-syntax-color); }

    /* Lists */
    .md-list { color: var(--md-list-color); font-weight: 600; }

    /* Strikethrough */
    .md-strikethrough { text-decoration: line-through; color: var(--md-syntax-color); }

    /* Tables */
    .md-table { color: var(--md-table-color); }

    /* Footnotes / misc */
    .md-footnote { color: var(--md-link-color); }

    /*
     * CSS variable palette — light mode defaults.
     * These will automatically adapt to SN themes because we inherit
     * --sn-stylekit-* values, but we also define standalone fallbacks.
     */
    :root {
      --md-heading-color:    #2563eb;
      --md-syntax-color:     #9ca3af;
      --md-code-color:       #d97706;
      --md-code-bg:          rgba(217, 119, 6, 0.08);
      --md-blockquote-color: #6b7280;
      --md-link-color:       #0891b2;
      --md-image-color:      #7c3aed;
      --md-list-color:       #059669;
      --md-table-color:      #db2777;
    }

    /* Dark mode: detect via media query as a fallback;
       SN themes inject their own vars which will override these */
    @media (prefers-color-scheme: dark) {
      :root {
        --md-heading-color:    #60a5fa;
        --md-syntax-color:     #6b7280;
        --md-code-color:       #fbbf24;
        --md-code-bg:          rgba(251, 191, 36, 0.1);
        --md-blockquote-color: #9ca3af;
        --md-link-color:       #38bdf8;
        --md-image-color:      #a78bfa;
        --md-list-color:       #34d399;
        --md-table-color:      #f472b6;
      }
    }
  </style>
</head>
<body>
<div id="editor-container">
  <!-- Highlighted rendering layer -->
  <div id="highlight-display" aria-hidden="true"></div>
  <!-- Raw input layer (transparent, captures all typing) -->
  <textarea id="raw-input" spellcheck="true" autocorrect="on" autocapitalize="sentences" aria-label="Markdown editor"></textarea>
</div>

<script>
// ─────────────────────────────────────────────────────────────
//  Standard Notes Component Relay (lightweight, self-contained)
//  Handles bi-directional messaging between the iframe and SN.
// ─────────────────────────────────────────────────────────────
(function () {
  'use strict';

  const rawInput   = document.getElementById('raw-input');
  const highlight  = document.getElementById('highlight-display');

  // ── State ──────────────────────────────────────────────────
  let currentNote  = null;
  let saveTimeout  = null;
  let initialised  = false;

  // ── Sync scroll between layers ─────────────────────────────
  rawInput.addEventListener('scroll', () => {
    highlight.scrollTop  = rawInput.scrollTop;
    highlight.scrollLeft = rawInput.scrollLeft;
  });

  // ── Markdown → highlighted HTML ────────────────────────────
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function highlightMarkdown(raw) {
    // Work line-by-line for block-level elements,
    // then apply inline rules within each line.
    const lines = raw.split('\n');
    let inFencedBlock = false;
    let fenceChar = '';

    const result = lines.map(line => {
      const escaped = escapeHtml(line);

      // ── Fenced code blocks ──────────────────────────────
      const fenceMatch = line.match(/^(`{3,}|~{3,})(.*)/);
      if (fenceMatch) {
        if (!inFencedBlock) {
          inFencedBlock = true;
          fenceChar = fenceMatch[1][0];
          return `<span class="md-codeblock md-syntax">${escaped}</span>`;
        } else if (fenceMatch[1][0] === fenceChar) {
          inFencedBlock = false;
          fenceChar = '';
          return `<span class="md-codeblock md-syntax">${escaped}</span>`;
        }
      }
      if (inFencedBlock) {
        return `<span class="md-codeblock">${escaped}</span>`;
      }

      // ── Headings ────────────────────────────────────────
      const h6 = escaped.match(/^(#{6})\s(.*)/);
      if (h6) return `<span class="md-syntax">${h6[1]} </span><span class="md-h6">${h6[2]}</span>`;
      const h5 = escaped.match(/^(#{5})\s(.*)/);
      if (h5) return `<span class="md-syntax">${h5[1]} </span><span class="md-h5">${h5[2]}</span>`;
      const h4 = escaped.match(/^(#{4})\s(.*)/);
      if (h4) return `<span class="md-syntax">${h4[1]} </span><span class="md-h4">${h4[2]}</span>`;
      const h3 = escaped.match(/^(#{3})\s(.*)/);
      if (h3) return `<span class="md-syntax">${h3[1]} </span><span class="md-h3">${h3[2]}</span>`;
      const h2 = escaped.match(/^(#{2})\s(.*)/);
      if (h2) return `<span class="md-syntax">${h2[1]} </span><span class="md-h2">${h2[2]}</span>`;
      const h1 = escaped.match(/^(#)\s(.*)/);
      if (h1) return `<span class="md-syntax">${h1[1]} </span><span class="md-h1">${h1[2]}</span>`;

      // ── Setext headings ─────────────────────────────────
      if (/^={3,}\s*$/.test(line) || /^-{3,}\s*$/.test(line)) {
        return `<span class="md-syntax">${escaped}</span>`;
      }

      // ── Horizontal rules ────────────────────────────────
      if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(line)) {
        return `<span class="md-hr">${escaped}</span>`;
      }

      // ── Blockquotes ─────────────────────────────────────
      if (/^>/.test(line)) {
        return `<span class="md-blockquote">${escaped}</span>`;
      }

      // ── Unordered list markers ───────────────────────────
      if (/^(\s*)([-*+])\s/.test(line)) {
        return escaped.replace(/^(\s*)([-*+])(\s)/, (_, sp, bullet, space) =>
          `${sp}<span class="md-list">${escapeHtml(bullet)}</span>${space}`
        );
      }

      // ── Ordered list markers ─────────────────────────────
      if (/^(\s*)(\d+\.)\s/.test(line)) {
        return escaped.replace(/^(\s*)(\d+\.)(\s)/, (_, sp, num, space) =>
          `${sp}<span class="md-list">${num}</span>${space}`
        );
      }

      // ── Table rows ───────────────────────────────────────
      if (/^\|/.test(line)) {
        return `<span class="md-table">${escaped}</span>`;
      }

      // ── Inline rules ─────────────────────────────────────
      return applyInlineRules(escaped);
    });

    return result.join('\n');
  }

  function applyInlineRules(str) {
    // Order matters — process longer/more-specific patterns first.

    // Inline code (backtick) — must go before bold/italic
    str = str.replace(/(`)([^`]+)(`)/g,
      (_, open, content, close) =>
        `<span class="md-syntax">${open}</span><span class="md-code">${content}</span><span class="md-syntax">${close}</span>`
    );

    // Images  ![alt](url)
    str = str.replace(/(!)\[([^\]]*)\](\([^)]*\))/g,
      (_, bang, alt, paren) =>
        `<span class="md-image">${bang}[${alt}]${paren}</span>`
    );

    // Links  [text](url)
    str = str.replace(/(\[)([^\]]+)(\]\([^)]*\))/g,
      (_, open, text, rest) =>
        `<span class="md-syntax">${open}</span><span class="md-link">${text}</span><span class="md-syntax">${rest}</span>`
    );

    // Bold+Italic  ***text***  or  ___text___
    str = str.replace(/(\*{3}|_{3})([^*_]+)(\*{3}|_{3})/g,
      (_, open, content, close) =>
        `<span class="md-syntax">${open}</span><span class="md-bold-italic">${content}</span><span class="md-syntax">${close}</span>`
    );

    // Bold  **text**  or  __text__
    str = str.replace(/(\*{2}|_{2})([^*_\n]+)(\*{2}|_{2})/g,
      (_, open, content, close) =>
        `<span class="md-syntax">${open}</span><span class="md-bold">${content}</span><span class="md-syntax">${close}</span>`
    );

    // Italic  *text*  or  _text_
    str = str.replace(/(\*|_)([^*_\n]+)(\*|_)/g,
      (_, open, content, close) =>
        `<span class="md-syntax">${open}</span><span class="md-italic">${content}</span><span class="md-syntax">${close}</span>`
    );

    // Strikethrough  ~~text~~
    str = str.replace(/(~~)([^~\n]+)(~~)/g,
      (_, open, content, close) =>
        `<span class="md-syntax">${open}</span><span class="md-strikethrough">${content}</span><span class="md-syntax">${close}</span>`
    );

    // Footnote references  [^1]  or definitions  [^1]:
    str = str.replace(/(\[\^[^\]]+\]:?)/g,
      (_, ref) => `<span class="md-footnote">${ref}</span>`
    );

    return str;
  }

  function render() {
    highlight.innerHTML = highlightMarkdown(rawInput.value);
    highlight.scrollTop = rawInput.scrollTop;
  }

  // ── Standard Notes messaging ────────────────────────────────
  const snOrigins = new Set([
    'https://app.standardnotes.com',
    'https://standardnotes.com',
    'https://listed.to',
    // desktop apps use file:// or app:// — allow any for those
  ]);

  function isFromSN(origin) {
    // Allow any origin from standardnotes domains or file/app protocols
    return (
      snOrigins.has(origin) ||
      origin.startsWith('file://') ||
      origin.startsWith('app://') ||
      origin === 'null' // some desktop wrappers send 'null'
    );
  }

  function sendMessage(action, data) {
    const message = {
      action,
      data,
      componentData: { componentIdentifier: 'com.github.yourusername.md-highlight-editor' },
    };
    // Send to parent (Standard Notes)
    window.parent.postMessage(message, '*');
  }

  function handleMessage(event) {
    if (!event.data || typeof event.data !== 'object') return;

    const { action, data } = event.data;

    switch (action) {
      case 'component-registered':
        initialised = true;
        // Request the active note
        sendMessage('stream-context-item', {});
        break;

      case 'stream-context-item': {
        const note = data && data.item;
        if (!note) return;
        currentNote = note;
        const text = (note.content && note.content.text) || '';
        // Only update textarea if value actually changed (avoid caret jumps)
        if (rawInput.value !== text) {
          rawInput.value = text;
        }
        render();
        break;
      }

      case 'reply': {
        // Replies to our save actions — nothing to do
        break;
      }

      default:
        break;
    }
  }

  window.addEventListener('message', handleMessage);

  // ── Save to Standard Notes ───────────────────────────────────
  function saveNote() {
    if (!currentNote) return;
    const text = rawInput.value;

    // Build a simple plain-text preview (first non-empty line, stripped of #)
    const previewLine = text.split('\n').find(l => l.trim().length > 0) || '';
    const preview = previewLine.replace(/^#+\s*/, '').substring(0, 200);

    sendMessage('save-items', {
      items: [{
        uuid:         currentNote.uuid,
        content_type: currentNote.content_type,
        content: {
          ...currentNote.content,
          text,
          preview_plain: preview,
        },
      }],
    });
  }

  // ── Input handling ───────────────────────────────────────────
  rawInput.addEventListener('input', () => {
    render();
    // Debounce saves — 300ms after typing stops
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveNote, 300);
  });

  // Also save on keydown for Ctrl/Cmd+S
  rawInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      clearTimeout(saveTimeout);
      saveNote();
    }
    // Tab key inserts spaces instead of moving focus
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = rawInput.selectionStart;
      const end   = rawInput.selectionEnd;
      rawInput.value = rawInput.value.substring(0, start) + '    ' + rawInput.value.substring(end);
      rawInput.selectionStart = rawInput.selectionEnd = start + 4;
      render();
    }
  });

  // ── Register with Standard Notes ─────────────────────────────
  // Send initial registration message
  sendMessage('component-ready', {});

  // Fallback: if SN doesn't respond quickly (e.g. during local testing),
  // just show an empty editable area.
  setTimeout(() => {
    if (!initialised) {
      // Not inside Standard Notes — show demo mode notice
      rawInput.placeholder = 'Type your markdown here (demo mode — not connected to Standard Notes)';
      rawInput.value = '';
      render();
    }
  }, 1500);

})();
</script>
</body>
</html>
