<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Syntax Highlighter</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #0d1117;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    color: #e6edf3;
  }

  #editor {
    width: 100%;
    height: 100%;
    position: relative;
  }

  #backdrop {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    pointer-events: none;
    z-index: 1;
  }

  #highlight-layer {
    padding: 24px 28px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    letter-spacing: 0px;
    tab-size: 2;
    -moz-tab-size: 2;
    min-height: 100%;
  }

  #input {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    padding: 24px 28px;
    background: transparent;
    color: transparent;
    caret-color: #58a6ff;
    border: none;
    outline: none;
    resize: none;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.75;
    z-index: 2;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    letter-spacing: 0px;
    tab-size: 2;
    -moz-tab-size: 2;
    -webkit-text-fill-color: transparent;
    overflow: auto;
  }

  #input::selection {
    background: rgba(56, 139, 253, 0.3);
  }
  #input::-moz-selection {
    background: rgba(56, 139, 253, 0.3);
  }

  #status {
    position: fixed;
    bottom: 8px;
    right: 12px;
    font-size: 11px;
    color: #484f58;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .h1 { color: #ff7b72; font-weight: 700; }
  .h2 { color: #ffa657; font-weight: 700; }
  .h3 { color: #e3b341; font-weight: 600; }
  .h4 { color: #7ee787; font-weight: 600; }
  .h5 { color: #79c0ff; font-weight: 600; }
  .h6 { color: #d2a8ff; font-weight: 600; }
  .hm { opacity: 0.35; }

  .b { color: #ffa657; font-weight: 700; }
  .bm { color: #ffa657; opacity: 0.35; }

  .i { color: #d2a8ff; font-style: italic; }
  .im { color: #d2a8ff; opacity: 0.35; }

  .bi { color: #f0883e; font-weight: 700; font-style: italic; }
  .bim { color: #f0883e; opacity: 0.35; }

  .s { color: #6e7681; text-decoration: line-through; }
  .sm { color: #6e7681; opacity: 0.35; }

  .sup { color: #79c0ff; }
  .supm { color: #79c0ff; opacity: 0.35; }

  .sub { color: #79c0ff; }
  .subm { color: #79c0ff; opacity: 0.35; }

  .u { color: #e6edf3; text-decoration: underline; text-underline-offset: 3px; }
  .ut { color: #7ee787; opacity: 0.35; }

  .c { color: #79c0ff; background: rgba(110,118,129,0.15); border-radius: 3px; }
  .cm { color: #79c0ff; opacity: 0.3; }

  .cf { color: #7ee787; opacity: 0.4; }
  .cb { color: #8b949e; }

  .lb { color: #58a6ff; opacity: 0.35; }
  .lt { color: #58a6ff; text-decoration: underline; text-underline-offset: 2px; }
  .lu { color: #6e7681; }

  .ib { color: #d2a8ff; opacity: 0.4; }

  .bqm { color: #484f58; }
  .bq { color: #8b949e; }

  .ul { color: #ff7b72; font-weight: 700; }
  .ol { color: #ffa657; font-weight: 700; }

  .con { color: #7ee787; font-weight: 700; }
  .coff { color: #484f58; font-weight: 700; }

  .hr { color: #30363d; font-weight: 700; }

  #input::-webkit-scrollbar,
  #backdrop::-webkit-scrollbar { width: 6px; }
  #input::-webkit-scrollbar-track,
  #backdrop::-webkit-scrollbar-track { background: transparent; }
  #input::-webkit-scrollbar-thumb,
  #backdrop::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  body.light { background: #ffffff; color: #1f2328; }
  body.light #input { caret-color: #0969da; }
  body.light #input::selection { background: rgba(9,105,218,0.2); }
  body.light .h1 { color: #cf222e; }
  body.light .h2 { color: #bc4c00; }
  body.light .h3 { color: #9a6700; }
  body.light .h4 { color: #116329; }
  body.light .h5 { color: #0550ae; }
  body.light .h6 { color: #8250df; }
  body.light .b { color: #bc4c00; }
  body.light .bm { color: #bc4c00; }
  body.light .i { color: #8250df; }
  body.light .im { color: #8250df; }
  body.light .bi { color: #bc4c00; }
  body.light .bim { color: #bc4c00; }
  body.light .s { color: #8b949e; }
  body.light .sm { color: #8b949e; }
  body.light .sup { color: #0550ae; }
  body.light .supm { color: #0550ae; }
  body.light .sub { color: #0550ae; }
  body.light .subm { color: #0550ae; }
  body.light .u { color: #1f2328; }
  body.light .ut { color: #116329; }
  body.light .c { color: #0550ae; background: rgba(9,105,218,0.08); }
  body.light .cm { color: #0550ae; }
  body.light .cf { color: #116329; }
  body.light .cb { color: #1f2328; }
  body.light .lb { color: #0969da; }
  body.light .lt { color: #0969da; }
  body.light .lu { color: #8b949e; }
  body.light .ib { color: #8250df; }
  body.light .bqm { color: #d0d7de; }
  body.light .bq { color: #656d76; }
  body.light .ul { color: #cf222e; }
  body.light .ol { color: #bc4c00; }
  body.light .con { color: #116329; }
  body.light .coff { color: #8b949e; }
  body.light .hr { color: #d0d7de; }
  body.light #status { color: #afb8c1; }
</style>

</head>
<body>

<div id="editor">
  <div id="backdrop"><div id="highlight-layer"></div></div>
  <textarea id="input" spellcheck="true" placeholder="Start writing Markdown..."></textarea>
</div>
<div id="status">Connecting...</div>

<!-- Standard Notes Component Library -->
<script src="https://cdn.jsdelivr.net/npm/@anthropic-ai/sdk@0.0.0/dist/index.js"></script>

<script>
(function () {
  'use strict';

  var input = document.getElementById('input');
  var backdrop = document.getElementById('backdrop');
  var hl = document.getElementById('highlight-layer');
  var statusEl = document.getElementById('status');

  var currentNote = null;
  var lastSaved = '';
  var ignoreChange = false;
  var connected = false;

  // ============================================================
  // STANDARD NOTES COMMUNICATION
  // Using the raw postMessage protocol that all SN versions support
  // ============================================================

  var sessionKey = null;

  function genId() {
    return 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
  }

  function sendToSN(action, data, callback) {
    var msgId = genId();
    var msg = {
      action: action,
      data: data || {},
      messageId: msgId,
      sessionKey: sessionKey,
      api: 'component'
    };
    window.parent.postMessage(msg, '*');
  }

  function saveNote() {
    if (!currentNote || !connected) return;

    var text = input.value;
    if (text === lastSaved) return;

    lastSaved = text;

    // Clone content and update text
    var content = JSON.parse(JSON.stringify(currentNote.content || {}));
    content.text = text;

    // Preserve all existing appData, references etc
    sendToSN('save-items', {
      items: [{
        uuid: currentNote.uuid,
        content_type: currentNote.content_type,
        content: content
      }]
    });

    showStatus('Saving...');
  }

  // Listen for messages from Standard Notes
  window.addEventListener('message', function(event) {
    var data;
    try {
      data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
    } catch(e) {
      return;
    }
    if (!data || !data.action) return;

    switch(data.action) {

      case 'component-registered':
        sessionKey = data.sessionKey;
        connected = true;
        showStatus('Connected');

        // Ask SN to stream the current note to us
        sendToSN('stream-context-item');
        break;

      case 'context-item':
        if (data.data && data.data.item) {
          currentNote = data.data.item;

          var text = '';
          if (currentNote.content && currentNote.content.text != null) {
            text = currentNote.content.text;
          }

          if (text !== input.value) {
            ignoreChange = true;
            input.value = text;
            lastSaved = text;
            render();
          }

          // Check if note is locked
          try {
            var appData = currentNote.content.appData || {};
            var snData = appData['org.standardnotes.sn'] || {};
            if (snData.locked) {
              input.setAttribute('readonly', 'true');
            } else {
              input.removeAttribute('readonly');
            }
          } catch(e) {}

          showStatus('Loaded');
        }
        break;

      case 'save-items-reply':
        showStatus('Saved ✓');
        break;

      case 'themes':
        setTimeout(detectTheme, 100);
        break;
    }
  });

  // Tell SN we exist (triggers component-registered response)
  // SN will auto-detect this when the iframe loads, but we
  // also send a ready signal
  setTimeout(function() {
    sendToSN('stream-context-item');
  }, 50);

  function showStatus(msg) {
    statusEl.textContent = msg;
    statusEl.style.opacity = '1';
    clearTimeout(showStatus.t);
    showStatus.t = setTimeout(function() {
      if (msg === 'Saved ✓' || msg === 'Loaded' || msg === 'Connected') {
        statusEl.style.opacity = '0.3';
      }
    }, 2000);
  }

  // ============================================================
  // ALSO TRY ComponentRelay for older SN versions
  // ============================================================

  function tryComponentRelay() {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/sn-components-api@1.3.4/dist/dist.js';
    s.onload = function() {
      if (window.ComponentRelay && !connected) {
        var relay = new ComponentRelay({
          targetWindow: window,
          options: {
            coallesedSaving: true,
            coallesedSavingDelay: 250
          }
        });

        relay.streamContextItem(function(item) {
          if (connected) return; // direct method already working
          connected = true;
          currentNote = item;

          var text = '';
          if (item.content && item.content.text != null) {
            text = item.content.text;
          }

          if (text !== input.value) {
            ignoreChange = true;
            input.value = text;
            lastSaved = text;
            render();
          }

          showStatus('Connected (relay)');

          // Override saveNote to use relay
          saveNote = function() {
            if (!currentNote) return;
            var t = input.value;
            if (t === lastSaved) return;
            lastSaved = t;
            relay.saveItemWithPresave(currentNote, function() {
              currentNote.content.text = t;
            });
            showStatus('Saved ✓');
          };
        });
      }
    };
    s.onerror = function() {};
    document.head.appendChild(s);
  }

  tryComponentRelay();

  // ============================================================
  // HIGHLIGHTING ENGINE
  // ============================================================

  function esc(t) {
    return t
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function inl(s) {
    // images
    s = s.replace(/!\[([^\]]*)\]\(([^)]*)\)/g, function(_, alt, url) {
      return '<span class="ib">!</span><span class="lb">[</span><span class="lt">' + alt + '</span><span class="lb">](</span><span class="lu">' + url + '</span><span class="lb">)</span>';
    });

    // links
    s = s.replace(/\[([^\]]*)\]\(([^)]*)\)/g, function(_, txt, url) {
      return '<span class="lb">[</span><span class="lt">' + txt + '</span><span class="lb">](</span><span class="lu">' + url + '</span><span class="lb">)</span>';
    });

    // inline code
    s = s.replace(/`([^`]+)`/g, function(_, code) {
      return '<span class="cm">`</span><span class="c">' + code + '</span><span class="cm">`</span>';
    });

    // underline <u>text</u>
    s = s.replace(/&lt;u&gt;(.+?)&lt;\/u&gt;/g, function(_, txt) {
      return '<span class="ut">&lt;u&gt;</span><span class="u">' + txt + '</span><span class="ut">&lt;/u&gt;</span>';
    });

    // strikethrough
    s = s.replace(/~~([^~]+)~~/g, function(_, txt) {
      return '<span class="sm">~~</span><span class="s">' + txt + '</span><span class="sm">~~</span>';
    });

    // superscript
    s = s.replace(/\^([^\^]+)\^/g, function(_, txt) {
      return '<span class="supm">^</span><span class="sup">' + txt + '</span><span class="supm">^</span>';
    });

    // subscript (single ~, not ~~)
    s = s.replace(/(?<!~)~([^~]+)~(?!~)/g, function(_, txt) {
      return '<span class="subm">~</span><span class="sub">' + txt + '</span><span class="subm">~</span>';
    });

    // bold italic ***
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, function(_, txt) {
      return '<span class="bim">***</span><span class="bi">' + txt + '</span><span class="bim">***</span>';
    });

    // bold italic ___
    s = s.replace(/___(.+?)___/g, function(_, txt) {
      return '<span class="bim">___</span><span class="bi">' + txt + '</span><span class="bim">___</span>';
    });

    // bold **
    s = s.replace(/\*\*(.+?)\*\*/g, function(_, txt) {
      return '<span class="bm">**</span><span class="b">' + txt + '</span><span class="bm">**</span>';
    });

    // bold __
    s = s.replace(/__(.+?)__/g, function(_, txt) {
      return '<span class="bm">__</span><span class="b">' + txt + '</span><span class="bm">__</span>';
    });

    // italic *
    s = s.replace(/(?<!\*)\*([^\*]+)\*(?!\*)/g, function(_, txt) {
      return '<span class="im">*</span><span class="i">' + txt + '</span><span class="im">*</span>';
    });

    // italic _
    s = s.replace(/(?<![a-zA-Z0-9])_([^_]+)_(?![a-zA-Z0-9])/g, function(_, txt) {
      return '<span class="im">_</span><span class="i">' + txt + '</span><span class="im">_</span>';
    });

    return s;
  }

  function highlight(text) {
    var lines = text.split('\n');
    var out = [];
    var inCode = false;

    for (var i = 0; i < lines.length; i++) {
      var raw = lines[i];
      var escaped = esc(raw);

      if (/^(`{3,}|~{3,})/.test(raw)) {
        inCode = !inCode;
        out.push('<span class="cf">' + escaped + '</span>');
        continue;
      }
      if (inCode) {
        out.push('<span class="cb">' + escaped + '</span>');
        continue;
      }

      if (/^\s{0,3}([-*_])\s*(\1\s*){2,}$/.test(raw)) {
        out.push('<span class="hr">' + escaped + '</span>');
        continue;
      }

      var hm = raw.match(/^(#{1,6})\s(.*)/);
      if (hm) {
        var lv = hm[1].length;
        out.push('<span class="h' + lv + '"><span class="hm">' + esc(hm[1]) + '</span> ' + inl(esc(hm[2])) + '</span>');
        continue;
      }

      var bm = raw.match(/^(\s{0,3}>+)(.*)/);
      if (bm) {
        out.push('<span class="bqm">' + esc(bm[1]) + '</span><span class="bq">' + inl(esc(bm[2])) + '</span>');
        continue;
      }

      var um = raw.match(/^(\s*)([-*+])\s(.*)/);
      if (um) {
        var cm = um[3].match(/^\[([ xX])\]\s?(.*)/);
        if (cm) {
          var cc = cm[1] !== ' ' ? 'con' : 'coff';
          out.push(esc(um[1]) + '<span class="ul">' + esc(um[2]) + '</span> <span class="' + cc + '">[' + esc(cm[1]) + ']</span> ' + inl(esc(cm[2])));
        } else {
          out.push(esc(um[1]) + '<span class="ul">' + esc(um[2]) + '</span> ' + inl(esc(um[3])));
        }
        continue;
      }

      var om = raw.match(/^(\s*)(\d+[.\)])\s(.*)/);
      if (om) {
        out.push(esc(om[1]) + '<span class="ol">' + esc(om[2]) + '</span> ' + inl(esc(om[3])));
        continue;
      }

      out.push(inl(escaped));
    }

    return out.join('\n');
  }

  function render() {
    hl.innerHTML = highlight(input.value) + '\n';
  }

  function syncScroll() {
    backdrop.scrollTop = input.scrollTop;
    backdrop.scrollLeft = input.scrollLeft;
  }

  // ============================================================
  // SAVE TRIGGERS
  // ============================================================

  var saveTimer;
  function queueSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNote, 300);
  }

  function immediateSave() {
    clearTimeout(saveTimer);
    saveNote();
  }

  // Save when switching away
  window.addEventListener('beforeunload', immediateSave);
  window.addEventListener('blur', immediateSave);
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) immediateSave();
  });

  // ============================================================
  // AUTO-CONTINUE LISTS
  // ============================================================

  function handleEnter(ev) {
    if (ev.key !== 'Enter') return;
    var start = input.selectionStart;
    var val = input.value;
    var ls = val.lastIndexOf('\n', start - 1) + 1;
    var line = val.substring(ls, start);
    var ins = null;

    var cbm = line.match(/^(\s*)([-*+])\s\[[ xX]\]\s/);
    if (cbm) {
      if (line.replace(/^(\s*)([-*+])\s\[[ xX]\]\s/, '').trim() === '') {
        ev.preventDefault();
        input.value = val.substring(0, ls) + '\n' + val.substring(start);
        input.selectionStart = input.selectionEnd = ls + 1;
        render(); queueSave(); return;
      }
      ins = cbm[1] + cbm[2] + ' [ ] ';
    }

    if (!ins) {
      var ulm = line.match(/^(\s*)([-*+])\s/);
      if (ulm) {
        if (line.replace(/^(\s*)([-*+])\s/, '').trim() === '') {
          ev.preventDefault();
          input.value = val.substring(0, ls) + '\n' + val.substring(start);
          input.selectionStart = input.selectionEnd = ls + 1;
          render(); queueSave(); return;
        }
        ins = ulm[1] + ulm[2] + ' ';
      }
    }

    if (!ins) {
      var olm = line.match(/^(\s*)(\d+)([.\)])\s/);
      if (olm) {
        if (line.replace(/^(\s*)(\d+)([.\)])\s/, '').trim() === '') {
          ev.preventDefault();
          input.value = val.substring(0, ls) + '\n' + val.substring(start);
          input.selectionStart = input.selectionEnd = ls + 1;
          render(); queueSave(); return;
        }
        ins = olm[1] + (parseInt(olm[2], 10) + 1) + olm[3] + ' ';
      }
    }

    if (!ins) {
      var bqm = line.match(/^(\s*>+\s?)/);
      if (bqm) {
        if (line.substring(bqm[0].length).trim() === '') {
          ev.preventDefault();
          input.value = val.substring(0, ls) + '\n' + val.substring(start);
          input.selectionStart = input.selectionEnd = ls + 1;
          render(); queueSave(); return;
        }
        ins = bqm[1];
      }
    }

    if (ins) {
      ev.preventDefault();
      input.value = val.substring(0, start) + '\n' + ins + val.substring(input.selectionEnd);
      input.selectionStart = input.selectionEnd = start + 1 + ins.length;
      render(); queueSave();
    }
  }

  function handleTab(ev) {
    if (ev.key !== 'Tab') return;
    ev.preventDefault();
    var s = input.selectionStart;
    input.value = input.value.substring(0, s) + '  ' + input.value.substring(input.selectionEnd);
    input.selectionStart = input.selectionEnd = s + 2;
    render(); queueSave();
  }

  // ============================================================
  // EVENT LISTENERS
  // ============================================================

  input.addEventListener('input', function () {
    if (ignoreChange) { ignoreChange = false; return; }
    render();
    queueSave();
  });
  input.addEventListener('scroll', syncScroll);
  input.addEventListener('keydown', function (ev) {
    handleEnter(ev);
    handleTab(ev);
  });

  // ============================================================
  // THEME
  // ============================================================

  function detectTheme() {
    var bg = window.getComputedStyle(document.body).backgroundColor;
    if (!bg) return;
    var m = bg.match(/\d+/g);
    if (m && m.length >= 3) {
      var br = (parseInt(m[0]) * 299 + parseInt(m[1]) * 587 + parseInt(m[2]) * 114) / 1000;
      document.body.classList.toggle('light', br > 128);
    }
  }

  // ============================================================
  // INIT
  // ============================================================

  render();
  detectTheme();
  new MutationObserver(function () { setTimeout(detectTheme, 50); })
    .observe(document.body, { attributes: true, attributeFilter: ['style', 'class'] });

})();
</script>

</body>
</html>
