<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Highlighter</title>
<script src="https://cdn.jsdelivr.net/npm/@standardnotes/component-relay@2.1.2/dist/dist.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: #0d1117; color: #e6edf3;
    font-family: 'JetBrains Mono','SF Mono','Fira Code','Consolas',monospace; font-size: 14px; }

  #wrap { position: relative; width: 100%; height: 100%; }

  /* The highlight layer sits behind, purely decorative */
  #hl {
    position: absolute; inset: 0; overflow: auto; pointer-events: none; z-index: 1;
    padding: 20px; line-height: 1.75; white-space: pre-wrap; word-wrap: break-word;
    font-family: inherit; font-size: inherit;
  }

  /* The textarea is on top — fully transparent text so only highlights show */
  #ta {
    position: absolute; inset: 0; z-index: 2;
    width: 100%; height: 100%; padding: 20px;
    background: transparent; border: none; outline: none; resize: none;
    color: transparent; caret-color: #58a6ff;
    font-family: inherit; font-size: inherit; line-height: 1.75;
    white-space: pre-wrap; word-wrap: break-word; overflow: auto;
    -webkit-text-fill-color: transparent;
  }
  #ta::selection { background: rgba(56,139,253,0.25); }

  /* ── Syntax colours ── */
  .h1{color:#ff7b72;font-weight:700}.h2{color:#ffa657;font-weight:700}.h3{color:#e3b341;font-weight:600}
  .h4{color:#7ee787;font-weight:600}.h5{color:#79c0ff;font-weight:600}.h6{color:#d2a8ff;font-weight:600}
  .hm{opacity:.3}.bold{color:#ffa657;font-weight:700}.boldm{color:#ffa657;opacity:.3}
  .em{color:#d2a8ff;font-style:italic}.emm{color:#d2a8ff;opacity:.3}
  .code{color:#79c0ff;background:rgba(110,118,129,.15);border-radius:3px}.codem{color:#79c0ff;opacity:.25}
  .pre{color:#7ee787;opacity:.5}.preb{color:#8b949e}
  .strike{color:#6e7681;text-decoration:line-through}.strikem{opacity:.3}
  .lbr{color:#58a6ff;opacity:.35}.ltx{color:#58a6ff;text-decoration:underline;text-underline-offset:2px}.lurl{color:#6e7681}
  .bqm{color:#484f58}.bq{color:#8b949e}
  .ulb{color:#ff7b72;font-weight:700}.olb{color:#ffa657;font-weight:700}
  .hr{color:#30363d;font-weight:700}
  .cbx-on{color:#7ee787;font-weight:700}.cbx-off{color:#484f58;font-weight:700}

  /* Scrollbar */
  #ta::-webkit-scrollbar,#hl::-webkit-scrollbar{width:5px}
  #ta::-webkit-scrollbar-track,#hl::-webkit-scrollbar-track{background:transparent}
  #ta::-webkit-scrollbar-thumb,#hl::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
</style>
</head>
<body>
<div id="wrap">
  <div id="hl"></div>
  <textarea id="ta" spellcheck="true" placeholder="Write Markdown here..."></textarea>
</div>
<script>
(function(){
  var ta = document.getElementById('ta');
  var hl = document.getElementById('hl');

  /* ── Highlighting ── */
  function e(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function inline(s){
    // Images
    s = s.replace(/!\[([^\]]*)\]\(([^)]*)\)/g,'<span class="lbr">![</span><span class="ltx">$1</span><span class="lbr">](</span><span class="lurl">$2</span><span class="lbr">)</span>');
    // Links
    s = s.replace(/\[([^\]]*)\]\(([^)]*)\)/g,'<span class="lbr">[</span><span class="ltx">$1</span><span class="lbr">](</span><span class="lurl">$2</span><span class="lbr">)</span>');
    // Inline code
    s = s.replace(/`([^`]+)`/g,'<span class="codem">`</span><span class="code">$1</span><span class="codem">`</span>');
    // Strikethrough
    s = s.replace(/~~([^~]+)~~/g,'<span class="strikem">~~</span><span class="strike">$1</span><span class="strikem">~~</span>');
    // Bold+italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g,'<span class="boldm">***</span><span class="em bold">$1</span><span class="boldm">***</span>');
    // Bold
    s = s.replace(/\*\*(.+?)\*\*/g,'<span class="boldm">**</span><span class="bold">$1</span><span class="boldm">**</span>');
    s = s.replace(/__(.+?)__/g,'<span class="boldm">__</span><span class="bold">$1</span><span class="boldm">__</span>');
    // Italic
    s = s.replace(/(?<!\*)\*([^\*\n]+)\*(?!\*)/g,'<span class="emm">*</span><span class="em">$1</span><span class="emm">*</span>');
    s = s.replace(/(?<![a-zA-Z0-9])_([^_\n]+)_(?![a-zA-Z0-9])/g,'<span class="emm">_</span><span class="em">$1</span><span class="emm">_</span>');
    return s;
  }

  function paint(text){
    var lines = text.split('\n'), out = [], fence = false;
    for(var i=0;i<lines.length;i++){
      var r = lines[i], x = e(r);
      if(/^(`{3,}|~{3,})/.test(r)){ fence=!fence; out.push('<span class="pre">'+x+'</span>'); continue; }
      if(fence){ out.push('<span class="preb">'+x+'</span>'); continue; }
      if(/^\s{0,3}([-*_])\s*(\1\s*){2,}$/.test(r)){ out.push('<span class="hr">'+x+'</span>'); continue; }
      var hm=r.match(/^(#{1,6}) (.*)/);
      if(hm){ out.push('<span class="h'+hm[1].length+'"><span class="hm">'+e(hm[1])+'</span> '+inline(e(hm[2]))+'</span>'); continue; }
      var bqm=r.match(/^(\s{0,3}>+)(.*)/);
      if(bqm){ out.push('<span class="bqm">'+e(bqm[1])+'</span><span class="bq">'+inline(e(bqm[2]))+'</span>'); continue; }
      var ulm=r.match(/^(\s*)([-*+]) (.*)/);
      if(ulm){
        var cbx=ulm[3].match(/^\[([ xX])\] ?(.*)/);
        if(cbx){ var cls=cbx[1]!==' '?'cbx-on':'cbx-off'; out.push(e(ulm[1])+'<span class="ulb">'+e(ulm[2])+'</span> <span class="'+cls+'">['+e(cbx[1])+']</span> '+inline(e(cbx[2]))); }
        else{ out.push(e(ulm[1])+'<span class="ulb">'+e(ulm[2])+'</span> '+inline(e(ulm[3]))); }
        continue;
      }
      var olm=r.match(/^(\s*)(\d+[.)]) (.*)/);
      if(olm){ out.push(e(olm[1])+'<span class="olb">'+e(olm[2])+'</span> '+inline(e(olm[3]))); continue; }
      out.push(inline(x));
    }
    return out.join('\n');
  }

  function render(){ hl.innerHTML = paint(ta.value)+'\n'; }
  function syncScroll(){ hl.scrollTop=ta.scrollTop; hl.scrollLeft=ta.scrollLeft; }

  ta.addEventListener('scroll', syncScroll);
  ta.addEventListener('input', function(){ render(); save(); });

  /* Auto-continue lists on Enter */
  ta.addEventListener('keydown', function(ev){
    if(ev.key==='Tab'){
      ev.preventDefault();
      var s=ta.selectionStart;
      ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(ta.selectionEnd);
      ta.selectionStart=ta.selectionEnd=s+2; render(); save(); return;
    }
    if(ev.key!=='Enter') return;
    var s=ta.selectionStart, v=ta.value;
    var ls=v.lastIndexOf('\n',s-1)+1, line=v.slice(ls,s), ins=null;
    var cb=line.match(/^(\s*[-*+]) \[[ xX]\] /);
    if(cb){ if(!line.replace(/^(\s*[-*+]) \[[ xX]\] /,'').trim()){ev.preventDefault();ta.value=v.slice(0,ls)+'\n'+v.slice(s);ta.selectionStart=ta.selectionEnd=ls+1;render();save();return;} ins=cb[1]+' [ ] '; }
    if(!ins){var ul=line.match(/^(\s*[-*+]) /);if(ul){if(!line.slice(ul[0].length).trim()){ev.preventDefault();ta.value=v.slice(0,ls)+'\n'+v.slice(s);ta.selectionStart=ta.selectionEnd=ls+1;render();save();return;}ins=ul[0];}}
    if(!ins){var ol=line.match(/^(\s*)(\d+)([.)]) /);if(ol){if(!line.slice(ol[0].length).trim()){ev.preventDefault();ta.value=v.slice(0,ls)+'\n'+v.slice(s);ta.selectionStart=ta.selectionEnd=ls+1;render();save();return;}ins=ol[1]+(+ol[2]+1)+ol[3]+' ';}}
    if(!ins){var bq=line.match(/^(\s*>+ ?)/);if(bq){if(!line.slice(bq[0].length).trim()){ev.preventDefault();ta.value=v.slice(0,ls)+'\n'+v.slice(s);ta.selectionStart=ta.selectionEnd=ls+1;render();save();return;}ins=bq[1];}}
    if(ins){ev.preventDefault();ta.value=v.slice(0,s)+'\n'+ins+v.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1+ins.length;render();save();}
  });

  /* ── Standard Notes saving via ComponentRelay ── */
  var workingItem = null;
  var saveTimer = null;

  var relay = new ComponentRelay({
    targetWindow: window,
    acceptsRoles: ['editor-editor']
  });

  relay.streamContextItem(function(item){
    if(!item || !item.content) return;
    // Never overwrite what the user is actively typing — only load on fresh note
    if(item.isMetadataUpdate) return;
    workingItem = item;
    var text = item.content.text || '';
    ta.value = text;
    render();
  });

  function save(){
    if(!workingItem) return;
    // Update our local copy of the item's text
    workingItem.content.text = ta.value;
    // Kick off a debounced save
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      relay.saveItems({ items: [workingItem] });
    }, 275);
  }

  // Also save immediately when focus leaves
  ta.addEventListener('blur', function(){
    clearTimeout(saveTimer);
    if(workingItem){
      workingItem.content.text = ta.value;
      relay.saveItems({ items: [workingItem] });
    }
  });

  render();
})();
</script>
</body>
</html>
